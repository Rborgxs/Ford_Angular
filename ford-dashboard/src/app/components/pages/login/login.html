<div class="login-page d-flex align-items-center justify-content-center p-3">
	<div class="login-card glass shadow-lg">
		<div class="row g-0">
			<div class="col-md-6 d-none d-md-flex login-image-side">
				<img src="/ford-dashboard/public/ford.png" alt="Ford Ranger" class="w-100 h-100" style="object-fit: cover;">
				<div class="login-overlay"></div>
			</div>
			<div class="col-md-6 p-4 p-md-5 d-flex flex-column justify-content-center login-form-side">
				<div class="text-center mb-4">
					<img src="/ford-dashboard/public/img/ford.png" alt="Logo Ford" width="44" height="44" class="mb-2">
					<h5 class="fw-normal" style="color: var(--text-muted);">Boas-vindas de volta</h5>
				</div>
				<form [formGroup]="loginForm" (ngSubmit)="onSubmitLogin()">
					<div class="mb-3">
						<label class="form-label">Usuário</label>
						<input type="text" class="form-control" placeholder="Seu usuário" formControlName="nome">
					</div>
					<div class="mb-3">
						<label class="form-label">Senha</label>
						<div class="mb-3">
							<input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="Sua senha" formControlName="senha">
							<button type="button" class="password-toggle-btn" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
								@if (showPassword) {
									<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
										<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
										<path d="M1 1l22 22"/>
									</svg>
								} @else {
									<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
										<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
										<circle cx="12" cy="12" r="3"/>
									</svg>
								}
								</button>
						</div>
					</div>
					@if (errorMessage) {
						<div class="alert alert-danger py-2 small">{{ errorMessage }}</div>
					}
					<button type="submit" class="btn btn-primary w-100 mt-2" [disabled]="loginForm.invalid">
						Entrar
					</button>
				</form>
			</div>
		</div>
	</div>
</div>
